name: daily-pipeline

on:
  schedule:
    - cron: "30 1 * * *"        # 01:30 UTC = 07:00 IST target (usually lands 10-11 IST)
    - cron: "30 9 * * *"        # 15:00 IST self-healing retry — skips if today succeeded
  workflow_dispatch: {}          # manual runs from the Actions tab

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  contents: write        # heartbeat commit keeps the cron alive (see below)

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 330    # 3 states (BR+UP+RJ, 146 districts) — collect alone can take ~2h
    steps:
      - uses: actions/checkout@v5

      - name: Skip retry if today already succeeded (self-healing guard)
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY_IST=$(TZ=Asia/Kolkata date +%F)
          OK=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/daily.yml/runs?status=success&per_page=10" \
            | python3 -c "
          import json, sys
          from datetime import datetime, timezone, timedelta
          ist = timezone(timedelta(hours=5, minutes=30))
          runs = json.load(sys.stdin).get('workflow_runs', [])
          print(any(datetime.fromisoformat(r['run_started_at'].replace('Z','+00:00'))
                    .astimezone(ist).strftime('%Y-%m-%d') == '$TODAY_IST' for r in runs))")
          if [ "$OK" = "True" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "go=no" >> "$GITHUB_OUTPUT"
            echo "A successful run already happened today (IST) — skipping."
          else
            echo "go=yes" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v6
        if: steps.guard.outputs.go == 'yes'
        with:
          python-version: "3.12"
          cache: pip

      # data/ is gitignored, so without this every run starts with a COLD geocode
      # cache and re-buys the same Mapbox/Nominatim lookups daily (audit finding).
      - name: Restore geocode cache
        if: steps.guard.outputs.go == 'yes'
        uses: actions/cache@v4
        with:
          path: data/geocode_cache.json
          key: geocode-cache-${{ github.run_id }}
          restore-keys: |
            geocode-cache-

      - name: Install dependencies
        if: steps.guard.outputs.go == 'yes'
        run: pip install -r requirements.txt

      - name: Sync configs to DB (git config/ is the source of truth)
        if: steps.guard.outputs.go == 'yes'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/load_configs.py

      - name: Run daily pipeline (collect -> process -> geocode -> recompute -> export)
        if: steps.guard.outputs.go == 'yes'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}       # session-pooler URL (runners are IPv4-only)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}   # geocoding primary; empty = Nominatim only
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}   # site-watch pings; empty = console only
          PYTHONUNBUFFERED: "1"
        run: python -m pipeline.run daily --days 2

      # Never deploy a dataless build over a good site: if export failed upstream,
      # web/public/data can be missing/empty and we would publish an empty map
      # with a green check (audit finding, 19 Jul).
      - name: Verify export output before deploy
        id: exportcheck
        if: ${{ steps.guard.outputs.go == 'yes' && !cancelled() }}
        run: |
          ok=yes
          for f in web/public/data/meta.json web/public/data/hotspots.geojson \
                   web/public/data/incidents.json; do
            if [ ! -s "$f" ]; then echo "MISSING/EMPTY: $f"; ok=no; fi
          done
          # a hotspots file with zero features is also a red flag, not a deploy
          python3 -c "
          import json, sys
          try:
              n = len(json.load(open('web/public/data/hotspots.geojson'))['features'])
          except Exception as e:
              print('unreadable hotspots.geojson:', e); sys.exit(1)
          print('hotspot features:', n)
          sys.exit(1 if n == 0 else 0)
          " || ok=no
          echo "ok=$ok" >> "$GITHUB_OUTPUT"
          [ "$ok" = "yes" ] || echo "::warning::refusing to deploy — export output missing or empty"

      - name: Deploy dashboard to Vercel
        # deploys even when a pipeline stage failed (gate-passed data is always safe to
        # publish, and a stale site was the run #9 failure mode) — but ONLY when the
        # export actually produced data.
        if: ${{ steps.guard.outputs.go == 'yes' && !cancelled() && steps.exportcheck.outputs.ok == 'yes' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      # GitHub disables scheduled workflows after 60 days with NO repository activity.
      # This pipeline writes only to Supabase/Vercel, so a quiet stretch would silently
      # kill the cron (audit finding). A dated heartbeat is both the keep-alive and a
      # public record of runs.
      - name: Heartbeat commit (keeps the schedule from auto-disabling)
        if: ${{ steps.guard.outputs.go == 'yes' && !cancelled() }}
        run: |
          mkdir -p docs
          date -u '+{"last_run_utc": "%Y-%m-%dT%H:%M:%SZ"}' > docs/last_run.json
          git config user.name  "cfi-pipeline[bot]"
          git config user.email "pipeline@crashfreeindia.org"
          git add docs/last_run.json
          git diff --staged --quiet || git commit -m "chore: pipeline heartbeat [skip ci]"
          git push || echo "::warning::heartbeat push failed (cron keep-alive at risk)"
