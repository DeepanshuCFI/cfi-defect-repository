name: check-secrets
# Ops tool: manual dispatch prints which expected secrets are PRESENT/MISSING
# (presence only — values are never echoed). Useful because fine-grained PATs
# without the Secrets scope cannot list the secret store.

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report secret presence
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          for v in ANTHROPIC_API_KEY DATABASE_URL SUPABASE_URL SUPABASE_KEY \
                   MAPBOX_TOKEN VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -n "${!v}" ]; then echo "PRESENT  $v"; else echo "MISSING  $v"; fi
          done
